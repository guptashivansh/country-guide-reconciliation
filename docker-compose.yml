services:
  web:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
      - COUNTRY_GUIDE_DB=/app/data/country_guides.db
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: country_guides
      POSTGRES_USER: regulift
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regulift}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  app-data:
