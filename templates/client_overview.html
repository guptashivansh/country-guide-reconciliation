<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workforce Overview — Skuad</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ── Atlas design tokens (matches employee.html) ── */
:root {
  --paper:        #FFFFFF;
  --paper-2:      #F6F7F9;
  --paper-3:      #ECEEF2;
  --paper-line:   #E2E5EB;
  --ink:          #0E1014;
  --ink-2:        #2E323B;
  --ink-3:        #6B7180;
  --ink-4:        #A2A8B5;
  --accent:       #FF4800;
  --accent-2:     #E03E00;
  --accent-soft:  #FFE7DC;
  --accent-line:  #FFBFA0;
  --purple:       #6F4FF2;
  --purple-2:     #5B3FE0;
  --purple-soft:  #ECE7FF;
  --purple-line:  #C6B8FF;
  --navy:         #1B2336;
  --ok:           #1E8A5F;
  --ok-soft:      #DCF1E6;
  --warn:         #C9740F;
  --warn-soft:    #FFEFD6;
  --danger:       #C8302D;
  --danger-soft:  #FDE5E4;
  --info:         #1E5FB6;
  --info-soft:    #E2EDFB;
  --font-ui:      "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, monospace;
  --radius-s: 6px;
  --radius-m: 10px;
  --radius-l: 16px;
  --radius-xl: 24px;
  --shadow-1: 0 1px 0 rgba(14,16,20,0.04), 0 1px 2px rgba(14,16,20,0.05);
  --shadow-2: 0 2px 6px rgba(14,16,20,0.06), 0 14px 32px -18px rgba(14,16,20,0.18);
  --shadow-3: 0 8px 24px -8px rgba(14,16,20,0.18), 0 28px 60px -28px rgba(14,16,20,0.28);
  --maxw: 1280px;
  --gutter: 28px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}
body { min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; cursor: pointer; border: 0; background: transparent; }
input, textarea, select { font: inherit; color: inherit; }
::selection { background: var(--accent); color: #fff; }

.eyebrow { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--paper-line); border-radius: 999px; border: 2px solid var(--paper); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

/* ── App bar ── */
.appbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--paper-line);
}
.appbar-row1 {
  height: 56px;
  display: flex; align-items: center;
  padding: 0 var(--gutter);
  gap: 18px;
}
.appbar-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.appbar-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--radius-s);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
  letter-spacing: -0.5px;
}
.appbar-name { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
.appbar-divider { width: 1px; height: 22px; background: var(--paper-line); }
.appbar-product { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; }
.appbar-crumb {
  font-family: var(--font-mono); font-size: 11px; color: var(--ink-4);
  display: flex; align-items: center; gap: 6px;
}
.appbar-crumb a { color: var(--ink-3); }
.appbar-crumb a:hover { color: var(--ink); }
.appbar-crumb-sep { color: var(--paper-line); }
.appbar-spacer { flex: 1; }
.appbar-actions { display: flex; align-items: center; gap: 8px; }
.appbar-btn {
  height: 32px; padding: 0 12px;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-s);
  background: var(--paper-2);
  font-size: 12px; color: var(--ink-3);
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
  white-space: nowrap;
}
.appbar-btn:hover { color: var(--ink); background: var(--paper-3); }
.appbar-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.appbar-icon-btn {
  width: 32px; height: 32px; padding: 0;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-s);
  background: var(--paper-2);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3);
  position: relative;
  transition: all 0.15s;
}
.appbar-icon-btn:hover { color: var(--ink); background: var(--paper-3); }
.appbar-icon-btn .dot {
  position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; background: var(--accent);
  border: 2px solid var(--paper); border-radius: 50%;
}
.appbar-tenant {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px 4px 4px;
  border: 1px solid var(--paper-line);
  border-radius: 999px;
  background: var(--paper-2);
}
.appbar-tenant-mark {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1B2336 0%, #2E323B 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.appbar-tenant-name {
  font-size: 12.5px; font-weight: 600; color: var(--ink-2);
}
.appbar-tenant-caret { color: var(--ink-4); }
.appbar-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple) 0%, var(--accent) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}

/* nav tabs row */
.appbar-row2 {
  display: flex;
  padding: 0 var(--gutter);
  gap: 4px;
  border-top: 1px solid transparent;
}
.appbar-tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.appbar-tab:hover { color: var(--ink); }
.appbar-tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}
.appbar-tab-count {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--paper-3);
  color: var(--ink-3);
}
.appbar-tab.active .appbar-tab-count {
  background: var(--accent-soft);
  color: var(--accent-2);
}

/* ── Shell ── */
.shell {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 32px var(--gutter) 80px;
}

/* ── Buttons ── */
.btn {
  height: 36px; padding: 0 16px;
  border-radius: var(--radius-m);
  font-size: 13px; font-weight: 600;
  transition: all 0.15s;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--purple); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--purple-2); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover:not(:disabled) { background: var(--accent-2); }
.btn-ghost { background: transparent; border: 1px solid var(--paper-line); color: var(--ink-2); }
.btn-ghost:hover { background: var(--paper-2); }
.btn-sm { height: 30px; padding: 0 12px; font-size: 12px; }

/* ── Section heading ── */
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}
.section-head h2 {
  font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
  margin-top: 4px;
}
.section-head .sub {
  font-size: 13px; color: var(--ink-3); margin-top: 4px;
}
.section-head-actions { display: flex; gap: 8px; align-items: center; }

/* ── Card ── */
.card {
  background: var(--paper);
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-m);
  box-shadow: var(--shadow-1);
}
.card-pad { padding: 18px 20px; }

/* ── Generic tags ── */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 9px; border-radius: 999px;
  font-family: var(--font-mono); font-size: 10.5px;
  font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.tag-ok { background: var(--ok-soft); color: var(--ok); }
.tag-warn { background: var(--warn-soft); color: var(--warn); }
.tag-danger { background: var(--danger-soft); color: var(--danger); }
.tag-info { background: var(--info-soft); color: var(--info); }
.tag-purple { background: var(--purple-soft); color: var(--purple-2); }
.tag-accent { background: var(--accent-soft); color: var(--accent-2); }
.tag-neutral { background: var(--paper-3); color: var(--ink-3); }
.tag-outline { background: transparent; border: 1px solid var(--paper-line); color: var(--ink-3); }

.dot-status { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: var(--ok); }
.dot-warn { background: var(--warn); }
.dot-danger { background: var(--danger); }
.dot-info { background: var(--info); }
.dot-neutral { background: var(--ink-4); }

/* ── KPI strip ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.kpi {
  background: var(--paper);
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-m);
  padding: 16px 18px;
  position: relative;
}
.kpi-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.kpi-label {
  font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); font-weight: 500;
}
.kpi-value {
  font-family: var(--font-ui);
  font-size: 28px; font-weight: 800; letter-spacing: -0.8px;
  line-height: 1.05;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.kpi-unit {
  font-size: 14px; font-weight: 700; color: var(--ink-3);
  margin-left: 4px;
}
.kpi-foot {
  display: flex; align-items: center; gap: 6px;
  margin-top: 8px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--ink-3);
}
.kpi-delta { font-weight: 600; }
.kpi-delta-up { color: var(--ok); }
.kpi-delta-down { color: var(--danger); }
.kpi-delta-flat { color: var(--ink-3); }
.kpi-spark { position: absolute; right: 14px; bottom: 14px; opacity: 0.35; }
@media (max-width: 900px) { .kpi-strip { grid-template-columns: repeat(2, 1fr); } }

/* ── Tables (dense) ── */
.dtable {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.dtable thead th {
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 10px 14px;
  border-bottom: 1px solid var(--paper-line);
  background: var(--paper-2);
  white-space: nowrap;
}
.dtable thead th:first-child { border-top-left-radius: var(--radius-m); }
.dtable thead th:last-child { border-top-right-radius: var(--radius-m); }
.dtable tbody td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--paper-line);
  vertical-align: middle;
}
.dtable tbody tr:last-child td { border-bottom: none; }
.dtable tbody tr:hover { background: var(--paper-2); }
.dtable .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.dtable .right { text-align: right; }

/* ── Ask Atlas ── */
.ask-atlas {
  background: linear-gradient(135deg, var(--purple-soft) 0%, #F4EFFF 100%);
  border: 1px solid var(--purple-line);
  border-radius: var(--radius-l);
  padding: 22px 24px 20px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.ask-atlas::after {
  content: ""; position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(255,255,255,0.45) 0%, transparent 70%);
  pointer-events: none;
}
.ask-atlas-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.ask-atlas-mark {
  width: 26px; height: 26px;
  border-radius: 8px;
  background: var(--purple);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.ask-atlas-title { font-size: 14px; font-weight: 700; color: var(--purple-2); }
.ask-atlas-sub { font-size: 12px; color: var(--purple-2); opacity: 0.7; margin-left: auto; font-family: var(--font-mono); }
.ask-atlas-bar { display: flex; gap: 10px; align-items: center; position: relative; z-index: 1; }
.ask-atlas-bar input {
  flex: 1;
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: var(--radius-m);
  padding: 11px 14px;
  font-size: 14px; color: var(--ink);
  outline: none;
}
.ask-atlas-bar input::placeholder { color: var(--ink-4); }
.ask-suggestions {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px;
  position: relative; z-index: 1;
}
.ask-suggestion {
  font-size: 12px; color: var(--purple-2);
  background: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.95);
  border-radius: 999px;
  padding: 5px 12px;
  font-weight: 500;
  transition: all 0.15s;
}
.ask-suggestion:hover { background: #fff; }

/* ── Tiny helper bits ── */
.hr-soft { height: 1px; background: var(--paper-line); border: 0; }
.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; gap: 4px; }
.flex-1 { flex: 1; }
.text-muted { color: var(--ink-3); }
.text-sm { font-size: 12.5px; }
.text-xs { font-size: 11px; }
.text-mono-sm { font-family: var(--font-mono); font-size: 11px; }

/* ── Pills (filters) ── */
.pill-row { display: inline-flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.pill {
  padding: 5px 11px;
  font-size: 12px; font-weight: 600;
  color: var(--ink-3);
  background: var(--paper-2);
  border: 1px solid var(--paper-line);
  border-radius: 999px;
  transition: all 0.15s;
}
.pill:hover { color: var(--ink); }
.pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ── Overview page-specific styles ── */

/* greet */
.ov-greet {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 28px;
  padding: 28px 0 0;
  margin-bottom: 28px;
}
@media (max-width: 900px) { .ov-greet { grid-template-columns: 1fr; } }
.ov-greet h1 { font-size: 36px; font-weight: 800; letter-spacing: -1.2px; line-height: 1.08; margin-bottom: 10px; }
.ov-greet h1 .mark { color: var(--accent); }
.ov-greet .sub { font-size: 14px; color: var(--ink-3); max-width: 560px; line-height: 1.6; }
.ov-greet .sub strong { color: var(--ink-2); font-weight: 600; }
.ov-greet-pills { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.ov-greet-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--ink-3);
  background: var(--paper-2); border: 1px solid var(--paper-line);
  padding: 5px 10px; border-radius: 999px;
}
.ov-greet-pill .num { font-weight: 700; color: var(--ink-2); }

.ov-snapshot {
  background: linear-gradient(135deg, #1B2336 0%, #0E1014 100%);
  color: #fff;
  border-radius: var(--radius-l);
  padding: 22px 24px;
  box-shadow: var(--shadow-3);
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}
.ov-snapshot::before {
  content:""; position:absolute; right:-60px; top:-60px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(255,72,0,0.16) 0%, transparent 70%);
}
.ov-snapshot-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.6; margin-bottom: 14px; }
.ov-snapshot-h { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.ov-snapshot-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; position: relative; }
.ov-snap-v { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
.ov-snap-v .u { font-size: 11px; font-weight: 600; opacity: 0.7; margin-left: 3px; }
.ov-snap-l { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; margin-top: 3px; }
.ov-snap-flags { display: flex; gap: 6px; flex-wrap: wrap; }
.ov-snap-flag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 11px;
  font-family: var(--font-mono);
}
.ov-snap-foot {
  padding-top: 14px; margin-top: auto;
  border-top: 1px solid rgba(255,255,255,0.12);
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--font-mono); font-size: 11px; opacity: 0.75;
}

/* ── Country grid ── */
.ctry-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 1000px) { .ctry-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .ctry-grid { grid-template-columns: 1fr; } }

.ctry-card {
  background: var(--paper);
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-l);
  padding: 20px 22px;
  box-shadow: var(--shadow-1);
  transition: all 0.15s;
  display: flex; flex-direction: column; gap: 14px;
  cursor: pointer;
  position: relative;
}
.ctry-card:hover {
  border-color: var(--accent-line);
  box-shadow: var(--shadow-2);
  transform: translateY(-1px);
}
.ctry-card.focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-2); }
.ctry-card.available { background: var(--paper); border-style: dashed; border-color: var(--paper-line); }
.ctry-card.available:hover { border-style: solid; border-color: var(--purple-line); box-shadow: var(--shadow-2); }
.ctry-card.available .ctry-link { color: var(--purple); }
.ctry-card .avail-note {
  font-size: 12.5px; color: var(--ink-3);
  background: var(--paper-2);
  border-radius: var(--radius-s);
  padding: 8px 10px;
  margin-top: -4px;
  font-style: italic;
}

.ctry-head { display: flex; align-items: center; gap: 12px; }
.ctry-flag {
  width: 48px; height: 48px; border-radius: var(--radius-m);
  background: var(--paper-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.ctry-name { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
.ctry-region { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.06em; }
.ctry-headcount { margin-left: auto; text-align: right; }
.ctry-headcount-v { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
.ctry-headcount-l { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; }

.ctry-metric-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0 16px;
}
.ctry-metric { padding: 8px 0; }
.ctry-metric-l { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 2px; }

  transform: translate(-50%, -50%);

  text-decoration: none;

.world-dot.active {
  width: 42px; height: 42px;

.world-pulse {

  transform: translate(-50%, -50%);

  pointer-events: none;

const usd = (n, opts={}) => {
  if (opts.short) {
    if (Math.abs(n) >= 1000000) return "$" + (n/1000000).toFixed(2) + "M";
    if (Math.abs(n) >= 1000) return "$" + (n/1000).toFixed(0) + "K";
    return "$" + n.toLocaleString("en-US");
  }

};

function AskAtlas() {
  const [query, setQuery] = useState("");
  const [reply, setReply] = useState("");
  const [loading, setLoading] = useState(false);
  const suggestions = [
    "Where is it cheapest to hire 5 more senior engineers near India?",
    "Which countries offer English-fluent talent for customer success?",
    "What's the cost difference between Malaysia and Vietnam for a SWE?",
    "Summarize India compliance changes I haven't acknowledged yet",
    "If we open a US time zone team, which country has shortest lead time?",
  ];
  const ask = async (prompt) => {
    const q = prompt || query;
    if (!q.trim()) return;
    setLoading(true);
    setReply("");
    try {
      const res = await fetch("/api/employee/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({prompt: q}),
      });
      const data = await res.json();
      setReply(data.reply || data.error || "No response");
    } catch (e) {
      setReply("Failed to reach Atlas. Is the server running?");
    }
    setLoading(false);
  };
  return (
    <section className="ask-atlas">
      <div className="ask-atlas-header">
        <div className="ask-atlas-mark"><I.sparkle /></div>
        <div className="ask-atlas-title">Ask Atlas</div>
        <div className="ask-atlas-sub">Workforce intelligence across {SKUAD_COUNTRY_COUNT} countries</div>
      </div>
      <div className="ask-atlas-bar">
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")ask();}} placeholder="Ask anything about your India workforce, costs, compliance, or expansion plans…" />
        <button className="btn btn-primary" disabled={loading} onClick={()=>ask()}>{loading ? "Thinking…" : <><I.sparkle /> Ask</>}</button>
      </div>
      {reply && (
        <div style={{marginTop:14,padding:"14px 16px",background:"rgba(255,255,255,0.85)",border:"1px solid var(--purple-line)",borderRadius:"var(--radius-m)",fontSize:13,lineHeight:1.6,color:"var(--ink-2)",whiteSpace:"pre-wrap",position:"relative",zIndex:1}}>
          {reply}
        </div>
      )}
      <div className="ask-suggestions">
        {suggestions.map(s => (<button key={s} className="ask-suggestion" onClick={()=>{setQuery(s);ask(s);}}>{s}</button>))}
      </div>
    </section>
  );
}

          <a href="#browse-all" style={{display:"block",textAlign:"center",padding:"10px",fontSize:12,fontWeight:600,color:"var(--purple)"}}>See all {TOTAL_AVAILABLE} →</a>
        </div>
      </div>
    </section>
  );
}

function sectionLabel(s) {
  return s.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function confColor(c) {
  if (c >= 0.8) return "var(--ok)";
  if (c >= 0.5) return "var(--warn)";
  return "var(--danger)";
}

function ProvenanceClaims() {
  const [chains, setChains] = useState(null);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("All");

  useEffect(() => {
    fetch("/api/provenance/India")
      .then(r => r.json())
      .then(data => { setChains(data.chains || []); setLoading(false); })
      .catch(() => { setChains([]); setLoading(false); });
  }, []);

  const groups = chains ? Array.from(new Set(chains.map(c => {
    const s = c.section;
    if (["annual_leave","sick_leave","maternity_leave","public_holidays"].includes(s)) return "Leave & Time Off";
    if (["working_hours","overtime","probation"].includes(s)) return "Working Hours";
    if (["minimum_wage","income_tax","payroll_tax","withholding_tax"].includes(s)) return "Compensation";
    if (["health_insurance","social_security","pension","employee_benefits"].includes(s)) return "Benefits";
    if (["termination_notice","employer_obligations","industrial_relations"].includes(s)) return "Employment Terms";
    if (["work_permit","work_visa","expatriate_employment"].includes(s)) return "Immigration";
    return "Other";
  }))) : [];

  const filtered = chains ? chains.filter(c => {
    if (filter === "All") return true;
    const s = c.section;
    if (filter === "Leave & Time Off") return ["annual_leave","sick_leave","maternity_leave","public_holidays"].includes(s);
    if (filter === "Working Hours") return ["working_hours","overtime","probation"].includes(s);
    if (filter === "Compensation") return ["minimum_wage","income_tax","payroll_tax","withholding_tax"].includes(s);
    if (filter === "Benefits") return ["health_insurance","social_security","pension","employee_benefits"].includes(s);
    if (filter === "Employment Terms") return ["termination_notice","employer_obligations","industrial_relations"].includes(s);
    if (filter === "Immigration") return ["work_permit","work_visa","expatriate_employment"].includes(s);
    return true;
  }) : [];

  return (
    <section style={{marginBottom: 36}}>
      <div className="section-head">
        <div>
          <div className="eyebrow">Provenance · India</div>
          <h2>Rule claims &amp; source evidence</h2>
          <div className="sub">Every employment rule traced to its source paragraph, extraction confidence, and reviewer decision.</div>
        </div>
        <div className="section-head-actions">
          <a className="btn btn-ghost btn-sm" href="/employee/India">Full India guide <I.arrow /></a>
        </div>
      </div>

      {loading ? (
        <div className="prov-empty">Loading provenance data…</div>
      ) : chains.length === 0 ? (
        <div className="prov-empty">No provenance records found for India. Run a sync + approval cycle to populate.</div>
      ) : (
        <>
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            <button className={`pill ${filter==="All"?"active":""}`} onClick={()=>setFilter("All")}>All ({chains.length})</button>
            {groups.map(g => {
              const cnt = chains.filter(c => {
                const s = c.section;
                if (g === "Leave & Time Off") return ["annual_leave","sick_leave","maternity_leave","public_holidays"].includes(s);
                if (g === "Working Hours") return ["working_hours","overtime","probation"].includes(s);
                if (g === "Compensation") return ["minimum_wage","income_tax","payroll_tax","withholding_tax"].includes(s);
                if (g === "Benefits") return ["health_insurance","social_security","pension","employee_benefits"].includes(s);
                if (g === "Employment Terms") return ["termination_notice","employer_obligations","industrial_relations"].includes(s);
                if (g === "Immigration") return ["work_permit","work_visa","expatriate_employment"].includes(s);
                return false;
              }).length;
              return <button key={g} className={`pill ${filter===g?"active":""}`} onClick={()=>setFilter(g)}>{g} ({cnt})</button>;
            })}
          </div>
          <div className="prov-grid">
            {filtered.map(c => {
              const ch = c.chain;
              const ext = ch.extraction || {};
              const rev = ch.reviewer_action || {};
              const rule = ch.canonical_rule || {};
              const conf = ext.confidence;
              const fragment = ext.source_fragment;
              return (
                <div key={c.provenance_id} className="prov-card">
                  <div className="prov-card-head">
                    <span style={{fontSize:18}}>🇮🇳</span>
                    <span className="prov-card-section">{sectionLabel(c.section)}</span>
                    {rev.action && <span className="tag tag-ok">{rev.action}</span>}
                    {conf != null && (
                      <span className="prov-conf">
                        <span className="prov-conf-bar"><span className="prov-conf-fill" style={{width:`${Math.round(conf*100)}%`,background:confColor(conf)}} /></span>
                        <span style={{color:confColor(conf),fontWeight:600}}>{Math.round(conf*100)}%</span>
                      </span>
                    )}
                  </div>
                  <div className="prov-card-rule">{rule.value}</div>
                  {fragment && (
                    <div className="prov-card-fragment">
                      "{fragment}"
                    </div>
                  )}
                  <div className="prov-card-meta">
                    {ext.parser_version && <span>{ext.parser_version}</span>}
                    {rev.assignee && <span>· {rev.assignee}</span>}
                    {rev.reviewed_at && <span>· {new Date(rev.reviewed_at).toLocaleDateString()}</span>}
                    {ch.crawl_event && ch.crawl_event.source_url && (
                      <a href={ch.crawl_event.source_url} target="_blank" rel="noopener" style={{color:"var(--purple)",fontWeight:600,marginLeft:"auto"}}>Source ↗</a>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </section>
  );
}

function Compare() {
  const [role, setRole] = useState("Senior Software Engineer");
  const rows = ROLE_COMPARE[role];
  const max = Math.max(...rows.map(r => r.base + r.load));

  return (
    <section className="compare">
      <div className="compare-head">
        <div>
          <div className="eyebrow">Compare countries · for your next hire</div>
          <h3>What it costs to hire the same role, everywhere</h3>
          <div className="sub">Annual total employer cost in USD. Bars include base + statutory load. The tag <span className="tag tag-accent" style={{padding:"1px 5px",fontSize:9}}>YOU</span> marks your active country.</div>
        </div>
        <div className="compare-controls">
          <div className="compare-control">
            <span className="text-muted">Role:</span>
            <select value={role} onChange={e => setRole(e.target.value)}>
              {Object.keys(ROLE_COMPARE).map(k => <option key={k}>{k}</option>)}
            </select>
          </div>
          <div className="compare-control">
            <span className="text-muted">Seniority:</span>
            <select defaultValue="Senior">
              <option>Junior</option><option>Mid</option><option>Senior</option><option>Staff</option>
            </select>
          </div>
          <div className="compare-control">
            <span className="text-muted">Currency:</span>
            <select defaultValue="USD">
              <option>USD</option><option>Local</option>
            </select>
          </div>
        </div>
      </div>
      <div className="compare-bars">
        {rows.map(r => {
          const total = r.base + r.load;
          const pctTotal = (total / max) * 100;
          const pctBase = (r.base / total) * pctTotal;
          const pctOver = (r.load / total) * pctTotal;
          return (
            <div key={r.ctry} className={`compare-row ${r.active?"you":""}`}>
              <div className="compare-row-name"><span className="emoji">{r.flag}</span>{r.ctry}</div>
              <div className="compare-row-bar">
                <div className="compare-row-bar-base" style={{width: pctBase+"%"}} />
                <div className="compare-row-bar-over" style={{left: pctBase+"%", width: pctOver+"%"}} />
                <span className="compare-row-bar-label">{r.curr}</span>
              </div>
              <div>
                <div className="compare-row-total">{usd(total, {short:true})}</div>
                <div className="compare-row-total-sub">total / yr</div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="compare-legend">
        <div className="compare-legend-item"><span className="compare-legend-sw" style={{background:"var(--ink-2)"}} />Base salary</div>
        <div className="compare-legend-item"><span className="compare-legend-sw" style={{background:"var(--accent)"}} />Employer load (taxes, benefits, fees)</div>
        <div className="text-mono-sm text-muted" style={{marginLeft:"auto"}}>Indicative · Nov 2025 rates · FX as of today</div>
      </div>
    </section>
  );
}

function AggregateCost() {
  return (
    <section className="agg-section">
      <div className="section-head">
        <div>
          <div className="eyebrow">This month's payroll · India</div>
          <h2>November 2025</h2>
          <div className="sub">Settling Nov 24. All amounts in USD at today's FX. Adds new countries automatically as you start hiring there.</div>
        </div>
        <div className="section-head-actions">
          <button className="btn btn-ghost btn-sm"><I.download /> Statement</button>
          <button className="btn btn-primary btn-sm">Review &amp; approve</button>
        </div>
      </div>
      <div className="card" style={{padding:0, overflow:"hidden"}}>
        <table className="dtable agg-tbl">
          <thead>
            <tr>
              <th>Country</th>
              <th className="right">Headcount</th>
              <th className="right">Base salaries</th>
              <th className="right">Employer load</th>
              <th className="right">Skuad fees</th>
              <th className="right">Total this month</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            {ACTIVE_COUNTRIES.map(c => {
              const base = c.monthlyUsd * (1 / (1 + c.loadPct/100));
              const load = c.monthlyUsd - base;
              const fees = c.headcount * 199;
              const total = c.monthlyUsd + fees;
              return (
                <tr key={c.id}>
                  <td><span style={{display:"inline-flex",alignItems:"center",gap:8,fontWeight:600}}><span style={{fontSize:18}}>{c.flag}</span>{c.name}</span></td>
                  <td className="right num">{c.headcount}</td>
                  <td className="right num">{usd(Math.round(base))}</td>
                  <td className="right num">{usd(Math.round(load))}</td>
                  <td className="right num">{usd(fees)}</td>
                  <td className="right num row-strong">{usd(Math.round(total))}</td>
                  <td><span className="tag tag-ok"><span className="dot-status dot-ok" /> Ready</span></td>
                </tr>
              );
            })}
            <tr style={{background:"var(--paper-2)"}}>
              <td colSpan="7" style={{padding:"14px",fontSize:12,color:"var(--ink-3)",fontFamily:"var(--font-mono)"}}>
                <span style={{display:"inline-flex",alignItems:"center",gap:8}}>
                  <I.globe /> Want to add another country? Pick one from <a href="#browse-all" style={{color:"var(--purple)",fontWeight:600,marginLeft:4}}>Browse all countries</a> — Skuad spins up the entity, contract, and payroll in days.
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <AppBar />
      <main className="shell">
        <Greet />
        <KPIStrip />
        <AskAtlas />
        <MapSection />
        <CountryGrid />
        <ProvenanceClaims />
        <Compare />
        <div id="browse-all" style={{paddingTop:8}}><BrowseAll /></div>
        <footer style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:24,borderTop:"1px solid var(--paper-line)",fontFamily:"var(--font-mono)",fontSize:11,color:"var(--ink-4)",flexWrap:"wrap",gap:8}}>
          <span>Skuad Workforce · {COMPANY}</span>
          <span>Atlas Compliance · sweep Nov 22, 2025 · not legal advice</span>
        </footer>
      </main>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
