<!DOCTYPE html>
<html lang="en" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Compliance Intelligence{% endblock %} · Regulift</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ── Jakarta design tokens ── */
:root {
  --paper:        #FFFFFF;
  --paper-2:      #F6F7F9;
  --paper-3:      #ECEEF2;
  --paper-line:   #E2E5EB;
  --ink:          #0E1014;
  --ink-2:        #2E323B;
  --ink-3:        #6B7180;
  --ink-4:        #A2A8B5;
  --accent:       #FF4800;
  --accent-2:     #E03E00;
  --accent-soft:  #FFE7DC;
  --accent-line:  #FFBFA0;
  --purple:       #6F4FF2;
  --purple-2:     #5B3FE0;
  --purple-soft:  #ECE7FF;
  --purple-line:  #C6B8FF;
  --ok:           #1E8A5F;
  --ok-soft:      #DCF1E6;
  --ok-line:      #86CFB0;
  --warn:         #C9740F;
  --warn-soft:    #FFEFD6;
  --danger:       #C8302D;
  --danger-soft:  #FBDFDC;
  --info:         #1E5FB6;
  --info-soft:    #E2EDFB;
  --font-ui:   "Plus Jakarta Sans", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --radius-s: 6px; --radius-m: 10px; --radius-l: 16px;
  --shadow-1: 0 1px 0 rgba(14,16,20,.04), 0 1px 2px rgba(14,16,20,.05);
  --shadow-2: 0 2px 6px rgba(14,16,20,.06), 0 14px 32px -18px rgba(14,16,20,.18);
  --appbar-h: 56px;
  --tabbar-h: 42px;
  --topbar-height: calc(var(--appbar-h) + var(--tabbar-h));
  --drawer-width: 480px;

  /* ── Backward-compat aliases for child templates ── */
  --bg:              var(--paper);
  --surface:         var(--paper-2);
  --border:          var(--paper-line);
  --text:            var(--ink);
  --muted:           var(--ink-3);
  --card:            var(--paper);
  --accent-dim:      var(--accent-soft);
  --warn-dim:        var(--warn-soft);
  --danger-dim:      var(--danger-soft);
  --state-success:   var(--ok);
  --state-progress:  var(--purple);
  --state-blocked:   var(--danger);
  --evidence:        var(--purple);
  --severity-critical: var(--danger);
  --severity-high:     var(--warn);
  --severity-moderate: var(--warn);
  --severity-low:      var(--ink-3);
  --severity-info:     var(--ink-4);
}
[data-mode="dark"] {
  --paper:#0B0D11; --paper-2:#131620; --paper-3:#1B1F2A; --paper-line:#262B38;
  --ink:#F5F6F8; --ink-2:#D8DBE2; --ink-3:#9097A4; --ink-4:#5A6273;
  --accent:#FF6A33; --accent-2:#FF8C5C;
  --accent-soft:rgba(255,106,51,.12); --accent-line:rgba(255,106,51,.36);
  --purple:#9B85FF; --purple-2:#B5A5FF;
  --purple-soft:rgba(155,133,255,.14); --purple-line:rgba(155,133,255,.36);
  --ok:#5BBE92; --ok-soft:rgba(91,190,146,.10); --ok-line:rgba(91,190,146,.36);
  --warn:#E0A04A; --warn-soft:rgba(224,160,74,.10);
  --danger:#E87874; --danger-soft:rgba(232,120,116,.10);
  --shadow-1:0 1px 0 rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.4);
  --shadow-2:0 2px 6px rgba(0,0,0,.4),0 14px 32px -18px rgba(0,0,0,.6);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none} button{font:inherit;color:inherit;cursor:pointer;border:0;background:transparent}
input,textarea,select{font:inherit;color:inherit} ::selection{background:var(--accent);color:#fff}
.eyebrow{font-family:var(--font-mono);font-size:10.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
::-webkit-scrollbar{width:10px} ::-webkit-scrollbar-thumb{background:var(--paper-line);border-radius:999px;border:2px solid var(--paper)}

/* ── APPBAR ── */
.appbar{
  position:sticky;top:0;z-index:100;
  background:color-mix(in srgb,var(--paper) 94%,transparent);
  backdrop-filter:saturate(160%) blur(14px);
  -webkit-backdrop-filter:saturate(160%) blur(14px);
  border-bottom:1px solid var(--paper-line);
}

/* Row 1: brand + actions */
.appbar-row1{
  height:var(--appbar-h);
  display:flex;align-items:center;
  padding:0 32px;gap:14px;
}
.appbar-brand{display:flex;align-items:center;gap:9px;flex-shrink:0}
.appbar-logo{width:28px;height:28px;background:var(--accent);border-radius:var(--radius-s);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.appbar-name{font-weight:700;font-size:15px;letter-spacing:-.02em}
.appbar-divider{width:1px;height:20px;background:var(--paper-line);flex-shrink:0}
.appbar-product{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em}
.appbar-spacer{flex:1}
.appbar-actions{display:flex;align-items:center;gap:8px}
.appbar-env{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-2);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:20px;padding:3px 10px}
.appbar-btn{height:30px;padding:0 11px;border:1px solid var(--paper-line);border-radius:var(--radius-s);background:var(--paper-2);font-size:12px;color:var(--ink-3);display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.appbar-btn:hover{color:var(--ink);background:var(--paper-3);border-color:var(--ink-4)}
.appbar-status{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--ink-4)}
.appbar-status-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 5px var(--ok)}
.appbar-status-dot-warn{background:var(--warn);box-shadow:none}
.appbar-status-dot-err{background:var(--danger);box-shadow:none}

/* Row 2: nav tabs */
.appbar-row2{
  display:flex;
  padding:0 32px;
  gap:2px;
  border-top:1px solid transparent;
}
.appbar-tab{
  padding:9px 14px;
  font-size:13px;font-weight:600;color:var(--ink-3);
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:color .15s;
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;
}
.appbar-tab:hover{color:var(--ink)}
.appbar-tab.active{color:var(--ink);border-bottom-color:var(--accent)}
.appbar-tab-badge{
  font-family:var(--font-mono);font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:999px;
  background:var(--danger-soft);color:var(--danger);
}

/* ── WORKSPACE ── */
.workspace{min-height:calc(100vh - var(--topbar-height))}

/* ── PAGE HEADER ── */
.page-header{padding:24px 36px 18px;border-bottom:1px solid var(--paper-line)}
.page-breadcrumbs{font-family:var(--font-mono);font-size:11px;color:var(--ink-4);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.page-breadcrumbs a{color:var(--ink-3);transition:color .15s} .page-breadcrumbs a:hover{color:var(--accent)}
.page-breadcrumbs span{color:var(--ink-2)}
.page-title-row{display:flex;align-items:center;justify-content:space-between;gap:20px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.4px}
.page-subtitle{font-size:13px;color:var(--ink-3);margin-top:4px}
.page-content{padding:24px 36px 40px;max-width:1400px}

/* ── SHARED COMPONENTS ── */
.severity-badge{padding:3px 9px;border-radius:var(--radius-s);font-size:11px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;display:inline-flex;align-items:center;gap:5px}
.severity-critical{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(200,48,45,.25)}
.severity-high{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(201,116,15,.25)}
.severity-moderate{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(201,116,15,.2)}
.severity-low{background:var(--paper-3);color:var(--ink-3);border:1px solid var(--paper-line)}
.severity-info{background:var(--paper-2);color:var(--ink-4);border:1px solid var(--paper-line)}

.state-chip{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;display:inline-flex;align-items:center}
.state-queued{background:var(--paper-3);color:var(--ink-3);border:1px solid var(--paper-line)}
.state-fetched,.state-normalized,.state-extracted{background:var(--purple-soft);color:var(--purple-2);border:1px solid var(--purple-line)}
.state-reconciled{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok-line)}
.state-failed{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(200,48,45,.25)}
.state-approved{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok-line)}

.confidence-bar{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
.conf-track{width:60px;height:4px;background:var(--paper-line);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}

.timestamp-mono{font-family:var(--font-mono);font-size:11px;color:var(--ink-4);white-space:nowrap}
.section-kicker{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}

/* ── BUTTONS ── */
.btn-primary{background:var(--purple);color:#fff;border:none;padding:9px 18px;border-radius:var(--radius-m);font-family:var(--font-ui);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:var(--purple-2)} .btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-secondary{background:var(--paper-2);color:var(--ink-2);border:1px solid var(--paper-line);padding:9px 18px;border-radius:var(--radius-m);font-family:var(--font-ui);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{border-color:var(--ink-4);color:var(--ink)}
.btn-accent{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:var(--radius-m);font-family:var(--font-ui);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-accent:hover{background:var(--accent-2)}

/* ── PIPELINE STRIP ── */
.pipeline-strip{display:flex;align-items:center;gap:0}
.pipeline-stage{display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-4);white-space:nowrap}
.pipeline-stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pipeline-stage-connector{width:18px;height:1px;background:var(--paper-line);flex-shrink:0}
.ps-done .pipeline-stage-dot{background:var(--ok)} .ps-done{color:var(--ok)}
.ps-active .pipeline-stage-dot{background:var(--purple);animation:ps-pulse 1.5s ease-in-out infinite} .ps-active{color:var(--purple)}
.ps-failed .pipeline-stage-dot{background:var(--danger)} .ps-failed{color:var(--danger)}
.ps-pending .pipeline-stage-dot{background:var(--paper-line)}
.ps-done+.pipeline-stage-connector,.ps-active+.pipeline-stage-connector{background:var(--ok)}
@keyframes ps-pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── DRAWER ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(14,16,20,.45);z-index:300;backdrop-filter:blur(2px)}
.drawer-overlay.open{display:block}
.drawer-panel{position:fixed;top:0;right:0;width:var(--drawer-width);height:100vh;background:var(--paper);border-left:1px solid var(--paper-line);box-shadow:var(--shadow-2);z-index:310;transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column}
.drawer-panel.open{transform:translateX(0)}
.drawer-header{padding:18px 22px;border-bottom:1px solid var(--paper-line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.drawer-close{background:var(--paper-2);border:1px solid var(--paper-line);border-radius:var(--radius-s);color:var(--ink-3);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s}
.drawer-close:hover{color:var(--ink);border-color:var(--ink-4)}
.drawer-body{padding:20px 22px;flex:1;overflow-y:auto}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .appbar-row2{padding:0 16px;overflow-x:auto;scrollbar-width:none} .appbar-row2::-webkit-scrollbar{display:none}
  .page-content,.page-header{padding-left:16px;padding-right:16px}
  .appbar-row1{padding:0 16px}
  .appbar-product,.appbar-status{display:none}
}
@media(prefers-reduced-motion:reduce){.drawer-panel{transition:none} @keyframes ps-pulse{0%,100%{opacity:1}}}
</style>
{% block head %}{% endblock %}
</head>
<body>

<!-- APPBAR -->
<header class="appbar">
  <!-- Row 1: Brand + actions -->
  <div class="appbar-row1">
    <div class="appbar-brand">
      <a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit">
        <div class="appbar-logo">R</div>
        <span class="appbar-name">Regulift</span>
      </a>
    </div>
    <span class="appbar-divider"></span>
    <span class="appbar-product">Compliance Intelligence</span>
    <div class="appbar-spacer"></div>
    <div class="appbar-actions">
      <div class="appbar-status">
        <span class="appbar-status-dot" id="statusDot"></span>
        <span id="statusSyncLabel">Loading…</span>
      </div>
      <span class="appbar-env">Production</span>
      <button class="appbar-btn" id="themeBtn" onclick="toggleTheme()">
        <span id="themeIcon">&#9790;</span>
        <span id="themeLabel">Dark</span>
      </button>
      <a href="/" class="appbar-btn">&#8962; Hub</a>
    </div>
  </div>

  <!-- Row 2: Nav tabs -->
  {% block appbar_tabs %}
  <div class="appbar-row2">
    <a href="/compliance/dashboard" class="appbar-tab {% if nav_active == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/guide"                class="appbar-tab {% if nav_active == 'guides' %}active{% endif %}">Country Guides</a>
    <a href="/compliance/review"    class="appbar-tab {% if nav_active == 'review' %}active{% endif %}">
      Review Queue
      <span class="appbar-tab-badge" id="navQueueBadge" style="display:none"></span>
    </a>
    <a href="/ops#sources"           class="appbar-tab {% if nav_active == 'intake' %}active{% endif %}">Sources</a>
    <a href="/compliance/audit"     class="appbar-tab {% if nav_active == 'audit' %}active{% endif %}">Audit Trail</a>
    <a href="/compliance/settings"  class="appbar-tab {% if nav_active == 'settings' %}active{% endif %}">Settings</a>
  </div>
  {% endblock %}
</header>

<!-- WORKSPACE -->
<div class="workspace">
  {% block workspace %}{% endblock %}
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" role="presentation"></div>
<aside class="drawer-panel" id="drawerPanel" role="complementary" aria-label="Detail drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawerTitle"></span>
    <button class="drawer-close" id="drawerClose" aria-label="Close drawer">&times;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<script>
(function() {
  /* Theme */
  var html = document.documentElement;
  var saved = localStorage.getItem('atlas:theme') || 'light';
  applyTheme(saved);
  window.toggleTheme = function() {
    var next = html.getAttribute('data-mode') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('atlas:theme', next);
    applyTheme(next);
  };
  function applyTheme(mode) {
    html.setAttribute('data-mode', mode);
    var icon = document.getElementById('themeIcon');
    var lbl  = document.getElementById('themeLabel');
    if (icon) icon.textContent = mode === 'dark' ? '☀' : '☾';
    if (lbl)  lbl.textContent  = mode === 'dark' ? 'Light' : 'Dark';
  }

  /* Drawer */
  var overlay = document.getElementById('drawerOverlay');
  var panel   = document.getElementById('drawerPanel');
  var close   = document.getElementById('drawerClose');
  window.openDrawer = function(title, html) {
    document.getElementById('drawerTitle').textContent = title;
    document.getElementById('drawerBody').innerHTML = html;
    overlay.classList.add('open'); panel.classList.add('open'); close.focus();
  };
  window.closeDrawer = function() {
    overlay.classList.remove('open'); panel.classList.remove('open');
  };
  overlay.addEventListener('click', closeDrawer);
  close.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && panel.classList.contains('open')) closeDrawer();
  });

  /* Shell metrics */
  fetch('/api/metrics')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var pending = data.pending_reviews || 0;
      var badge = document.getElementById('navQueueBadge');
      if (badge && pending > 0) { badge.textContent = pending; badge.style.display = ''; }
      var dot = document.getElementById('statusDot');
      var lbl = document.getElementById('statusSyncLabel');
      if (data.crawl_failures > 0) {
        if (dot) { dot.className = 'appbar-status-dot appbar-status-dot-warn'; }
        if (lbl) lbl.textContent = data.crawl_failures + ' failures';
      } else {
        if (dot) dot.className = 'appbar-status-dot';
        if (lbl) lbl.textContent = 'All systems ok';
      }
    })
    .catch(function() {
      var dot = document.getElementById('statusDot');
      var lbl = document.getElementById('statusSyncLabel');
      if (dot) dot.className = 'appbar-status-dot appbar-status-dot-err';
      if (lbl) lbl.textContent = 'Offline';
    });
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
