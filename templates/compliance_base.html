<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Compliance Intelligence{% endblock %} · Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --border: #1e1e2e;
  --accent: #6ee7b7;
  --accent-dim: rgba(110,231,183,0.1);
  --warn: #fbbf24;
  --warn-dim: rgba(251,191,36,0.1);
  --danger: #f87171;
  --danger-dim: rgba(248,113,113,0.1);
  --text: #e2e8f0;
  --muted: #64748b;
  --card: #0f0f18;
  --severity-critical: #f87171;
  --severity-high: #fb923c;
  --severity-moderate: #fbbf24;
  --severity-low: #94a3b8;
  --severity-info: #64748b;
  --state-success: #6ee7b7;
  --state-progress: #60a5fa;
  --state-blocked: #f87171;
  --evidence: #a78bfa;
  --nav-width: 240px;
  --nav-collapsed: 64px;
  --topbar-height: 56px;
  --drawer-width: 480px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--topbar-height);
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 200;
  gap: 12px;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text);
  flex-shrink: 0;
}

.topbar-mark {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: #000;
}

.topbar-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.topbar-sep {
  color: var(--border);
  font-size: 18px;
  font-weight: 200;
}

.topbar-section {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.topbar-spacer { flex: 1; }

.topbar-env {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(110,231,183,0.24);
  border-radius: 20px;
  padding: 3px 10px;
}

.topbar-user {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ── LEFT NAV ── */
.sidenav {
  position: fixed;
  top: var(--topbar-height);
  left: 0;
  bottom: 0;
  width: var(--nav-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 150;
  transition: width 0.2s ease;
  overflow: hidden;
}

.sidenav-items {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.15s;
  white-space: nowrap;
  position: relative;
}

.nav-item:hover {
  color: var(--text);
  background: rgba(255,255,255,0.04);
}

.nav-item.active {
  color: var(--accent);
  background: var(--accent-dim);
}

.nav-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.nav-label {
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-badge {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  background: var(--danger);
  color: #fff;
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
}

.nav-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 14px;
}

/* ── STATUS RAIL ── */
.status-rail {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot-ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.status-dot-warn { background: var(--warn); }
.status-dot-err { background: var(--danger); }

/* ── WORKSPACE ── */
.workspace {
  margin-left: var(--nav-width);
  margin-top: var(--topbar-height);
  min-height: calc(100vh - var(--topbar-height));
  transition: margin-left 0.2s ease;
}

.page-header {
  padding: 28px 40px 20px;
  border-bottom: 1px solid var(--border);
}

.page-breadcrumbs {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.page-breadcrumbs a {
  color: var(--muted);
  text-decoration: none;
}

.page-breadcrumbs a:hover {
  color: var(--accent);
}

.page-breadcrumbs span {
  color: var(--text);
}

.page-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.page-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.page-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}

.page-content {
  padding: 28px 40px 40px;
  max-width: 1400px;
}

/* ── DRAWER SLOT ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
}

.drawer-overlay.open { display: block; }

.drawer-panel {
  position: fixed;
  top: 0;
  right: -var(--drawer-width);
  width: var(--drawer-width);
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 310;
  transform: translateX(100%);
  transition: transform 0.2s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.drawer-panel.open {
  transform: translateX(0);
}

.drawer-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.drawer-title {
  font-size: 14px;
  font-weight: 700;
}

.drawer-close {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}

.drawer-close:hover {
  color: var(--text);
  border-color: var(--muted);
}

.drawer-body {
  padding: 20px 24px;
  flex: 1;
  overflow-y: auto;
}

/* ── SHARED COMPONENTS ── */
.severity-badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.severity-critical { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
.severity-high { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
.severity-moderate { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }
.severity-low { background: rgba(148,163,184,0.12); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
.severity-info { background: rgba(100,116,139,0.09); color: #64748b; border: 1px solid rgba(100,116,139,0.2); }

.state-chip {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
}

.state-queued { background: rgba(100,116,139,0.12); color: #94a3b8; border: 1px solid rgba(100,116,139,0.28); }
.state-fetched,
.state-normalized,
.state-extracted { background: rgba(96,165,250,0.1); color: #93c5fd; border: 1px solid rgba(96,165,250,0.28); }
.state-reconciled { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(110,231,183,0.3); }
.state-failed { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
.state-approved { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(110,231,183,0.3); }

.confidence-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.conf-track {
  width: 64px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.conf-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.timestamp-mono {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}

.section-kicker {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.btn-primary {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-secondary:hover {
  border-color: var(--muted);
}

/* ── PIPELINE STRIP (shared component) ── */
.pipeline-strip {
  display: flex;
  align-items: center;
  gap: 0;
}

.pipeline-stage {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.pipeline-stage-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.pipeline-stage-connector {
  width: 20px;
  height: 1px;
  background: var(--border);
  flex-shrink: 0;
}

.ps-done .pipeline-stage-dot { background: var(--state-success); }
.ps-done { color: var(--state-success); }
.ps-active .pipeline-stage-dot { background: var(--state-progress); animation: ps-pulse 1.5s ease-in-out infinite; }
.ps-active { color: var(--state-progress); }
.ps-failed .pipeline-stage-dot { background: var(--state-blocked); }
.ps-failed { color: var(--state-blocked); }
.ps-pending .pipeline-stage-dot { background: rgba(100,116,139,0.3); }
.ps-done + .pipeline-stage-connector,
.ps-active + .pipeline-stage-connector { background: var(--state-success); }

@keyframes ps-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
  .sidenav { width: var(--nav-collapsed); }
  .nav-label, .nav-badge, .status-rail { display: none; }
  .nav-item { justify-content: center; padding: 10px; }
  .workspace { margin-left: var(--nav-collapsed); }
}

@media (max-width: 720px) {
  .sidenav { display: none; }
  .workspace { margin-left: 0; }
  .page-content { padding: 20px 16px; }
  .page-header { padding: 20px 16px 16px; }
  .topbar { padding: 0 16px; }
}

@media (prefers-reduced-motion: reduce) {
  .drawer-panel { transition: none; }
  .sidenav { transition: none; }
  @keyframes ps-pulse { 0%,100%{opacity:1} }
}
</style>
{% block head %}{% endblock %}
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <a href="/" class="topbar-logo">
    <div class="topbar-mark">A</div>
    <span class="topbar-name">Atlas</span>
  </a>
  <span class="topbar-sep">/</span>
  <span class="topbar-section">{% block topbar_section %}Compliance Intelligence{% endblock %}</span>
  <div class="topbar-spacer"></div>
  <span class="topbar-env">Production</span>
  <span class="topbar-user" id="userLabel"></span>
</header>

<!-- LEFT NAV -->
<nav class="sidenav" aria-label="Primary navigation">
  <div class="sidenav-items">
    <a href="/compliance/dashboard" class="nav-item {% if nav_active == 'dashboard' %}active{% endif %}" aria-current="{% if nav_active == 'dashboard' %}page{% endif %}">
      <span class="nav-icon" aria-hidden="true">◎</span>
      <span class="nav-label">Dashboard</span>
    </a>
    <a href="/guide" class="nav-item {% if nav_active == 'guides' %}active{% endif %}">
      <span class="nav-icon" aria-hidden="true">☰</span>
      <span class="nav-label">Country Guides</span>
    </a>
    <a href="/compliance/review" class="nav-item {% if nav_active == 'review' %}active{% endif %}">
      <span class="nav-icon" aria-hidden="true">⊘</span>
      <span class="nav-label">Review Queue</span>
      <span class="nav-badge" id="navQueueBadge" style="display:none"></span>
    </a>
    <a href="/compliance/intake" class="nav-item {% if nav_active == 'intake' %}active{% endif %}" aria-current="{% if nav_active == 'intake' %}page{% endif %}">
      <span class="nav-icon" aria-hidden="true">⊕</span>
      <span class="nav-label">Compliance Intake</span>
    </a>
    <div class="nav-divider"></div>
    <a href="/compliance/audit" class="nav-item {% if nav_active == 'audit' %}active{% endif %}">
      <span class="nav-icon" aria-hidden="true">⊞</span>
      <span class="nav-label">Audit Trail</span>
    </a>
    <a href="/compliance/settings" class="nav-item {% if nav_active == 'settings' %}active{% endif %}">
      <span class="nav-icon" aria-hidden="true">⚙</span>
      <span class="nav-label">Settings</span>
    </a>
  </div>

  <div class="status-rail" id="statusRail">
    <div class="status-item">
      <span class="status-dot status-dot-ok" id="statusDot"></span>
      <span id="statusSyncLabel">Loading...</span>
    </div>
    <div class="status-item">
      <span>Queue: </span>
      <strong id="statusQueueDepth">—</strong>
    </div>
  </div>
</nav>

<!-- WORKSPACE -->
<div class="workspace">
  {% block workspace %}{% endblock %}
</div>

<!-- DRAWER SLOT -->
<div class="drawer-overlay" id="drawerOverlay" role="presentation"></div>
<aside class="drawer-panel" id="drawerPanel" role="complementary" aria-label="Detail drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawerTitle"></span>
    <button class="drawer-close" id="drawerClose" aria-label="Close drawer">&times;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<script>
(function() {
  const drawerOverlay = document.getElementById('drawerOverlay');
  const drawerPanel = document.getElementById('drawerPanel');
  const drawerClose = document.getElementById('drawerClose');

  window.openDrawer = function(title, contentHtml) {
    document.getElementById('drawerTitle').textContent = title;
    document.getElementById('drawerBody').innerHTML = contentHtml;
    drawerOverlay.classList.add('open');
    drawerPanel.classList.add('open');
    drawerClose.focus();
  };

  window.closeDrawer = function() {
    drawerOverlay.classList.remove('open');
    drawerPanel.classList.remove('open');
  };

  drawerOverlay.addEventListener('click', closeDrawer);
  drawerClose.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && drawerPanel.classList.contains('open')) closeDrawer();
  });

  function loadShellMetrics() {
    fetch('/api/metrics')
      .then(r => r.json())
      .then(data => {
        const pending = data.pending_reviews || 0;
        const badge = document.getElementById('navQueueBadge');
        const depth = document.getElementById('statusQueueDepth');
        if (badge && pending > 0) { badge.textContent = pending; badge.style.display = ''; }
        if (depth) depth.textContent = pending + ' pending';

        const dot = document.getElementById('statusDot');
        const label = document.getElementById('statusSyncLabel');
        if (data.crawl_failures > 0) {
          dot.className = 'status-dot status-dot-warn';
          label.textContent = data.crawl_failures + ' failures';
        } else {
          dot.className = 'status-dot status-dot-ok';
          label.textContent = 'All systems ok';
        }
      })
      .catch(function() {
        var label = document.getElementById('statusSyncLabel');
        if (label) label.textContent = 'Offline';
        var dot = document.getElementById('statusDot');
        if (dot) dot.className = 'status-dot status-dot-err';
      });
  }

  loadShellMetrics();
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
